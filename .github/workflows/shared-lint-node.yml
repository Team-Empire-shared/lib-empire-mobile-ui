name: Shared Lint (Node.js)

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "20"
      working-directory:
        type: string
        default: "."


permissions:
  contents: read
  packages: read

env:
  NPM_AUDIT_LEVEL: "moderate"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          registry-url: https://npm.pkg.github.com

      - name: Install dependencies
        run: npm ci
        env:
          # github.token gets packages:read from the permissions block above.
          # No custom PAT needed â€” works for all @team-empire-shared and @empireoe packages.
          NODE_AUTH_TOKEN: ${{ github.token }}

      - name: ESLint check
        run: npm run lint --if-present

      - name: TypeScript check
        run: npm run type-check --if-present

      - name: Format check (Prettier)
        continue-on-error: true
        run: npm run format:check --if-present

      - name: Security audit
        continue-on-error: true
        run: npm audit --audit-level=${{ env.NPM_AUDIT_LEVEL }}

      - name: Repo hygiene (no tracked node_modules)
        run: |
          if git ls-files | grep -nE "^node_modules/"; then
            echo "node_modules are tracked in git. Add to .gitignore"
            exit 1
          fi
