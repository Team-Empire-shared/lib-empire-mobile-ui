name: Shared Lint (Node.js)

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "20"
      working-directory:
        type: string
        default: "."

env:
  NPM_AUDIT_LEVEL: "moderate"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint check
        run: npm run lint --if-present
        env:
          # ESLint 9 uses flat config by default; repos still on legacy .eslintrc
          ESLINT_USE_FLAT_CONFIG: "false"

      - name: TypeScript check
        run: npm run type-check --if-present

      - name: Format check (Prettier)
        continue-on-error: true
        run: npm run format:check --if-present

      - name: Security audit
        continue-on-error: true
        run: npm audit --audit-level=${{ env.NPM_AUDIT_LEVEL }}

      - name: Repo hygiene (no tracked node_modules)
        run: |
          if git ls-files | grep -nE "^node_modules/"; then
            echo "node_modules are tracked in git. Add to .gitignore"
            exit 1
          fi
