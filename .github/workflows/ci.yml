# Template: Node.js Frontend CI
# Drop this into .github/workflows/ci.yml for any Next.js/React frontend repo.
# Also copy shared-lint-node.yml and shared-test-node.yml into .github/workflows/

name: CI

on:
  push:
    branches: [main, dev, staging]
    paths-ignore: ["docs/**", "*.md"]
  pull_request:
    paths-ignore: ["docs/**", "*.md"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}


permissions:
  contents: read

jobs:
  lint:
    uses: ./.github/workflows/shared-lint-node.yml
    with:
      node-version: "20"

  test:
    needs: lint
    uses: ./.github/workflows/shared-test-node.yml
    with:
      node-version: "20"
      test-command: "npm test"

  build:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build

  ci-passed:
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, test, build]
    steps:
      - name: Check results
        run: |
          results=("${{ needs.lint.result }}" "${{ needs.test.result }}" "${{ needs.build.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" ]]; then
              echo "CI FAILED"; exit 1
            fi
          done
          echo "CI passed"
